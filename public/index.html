<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMONGUSGXMES</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #ff1a1a;
            --primary-dark: #8b0000;
            --accent: #00ff66;
            --black: #0a0a0a;
            --dark-gray: #1a1a1a;
            --gray: #2a2a2a;
            --white: #ffffff;
        }
        html, body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--black);
            color: var(--white);
            overflow: hidden;
        }
        
        /* Start Screen */
        #startScreen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            background: radial-gradient(ellipse at center, rgba(139,0,0,0.4) 0%, rgba(0,0,0,0.95) 70%);
            cursor: pointer;
        }
        #startScreen.hidden { display: none; }
        .logo-text {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(180deg, #ff0000 0%, #8b0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            line-height: 1.1;
        }
        .hold-text {
            margin-top: 30px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.2em;
        }
        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 20px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.8s linear;
        }
        .holding .progress-fill { width: 100%; }
        
        /* App Layout */
        #app {
            display: flex;
            height: 100%;
        }
        
        /* Sidebar */
        #sidebar {
            width: 80px;
            background: var(--dark-gray);
            border-right: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }
        .sidebar-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .nav-item {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255,255,255,0.6);
            font-size: 0.6rem;
            gap: 4px;
            transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--primary);
            color: var(--white);
        }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
        
        /* Main Content */
        #mainContent {
            flex: 1;
            overflow: hidden;
        }
        .section {
            display: none;
            height: 100%;
            padding: 25px;
            overflow-y: auto;
        }
        .section.active { display: block; }
        
        .section-header {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), #ff6666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Proxy */
        .proxy-container {
            display: flex;
            flex-direction: column;
            height: calc(100% - 80px);
            background: var(--dark-gray);
            border-radius: 16px;
            border: 2px solid var(--primary-dark);
            overflow: hidden;
        }
        .proxy-toolbar {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: var(--black);
            border-bottom: 2px solid var(--primary-dark);
        }
        .proxy-input-group {
            flex: 1;
            display: flex;
            background: var(--black);
            border: 2px solid var(--gray);
            border-radius: 8px;
            overflow: hidden;
        }
        .proxy-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--white);
            padding: 0 15px;
            font-size: 14px;
            outline: none;
        }
        .proxy-btn {
            padding: 0 20px;
            background: var(--primary);
            border: none;
            color: var(--white);
            cursor: pointer;
            font-weight: 700;
        }
        .proxy-viewport {
            flex: 1;
            position: relative;
        }
        #proxyFrame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Games Grid */
        .games-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .search-box {
            padding: 12px 20px;
            background: var(--black);
            border: 2px solid var(--gray);
            border-radius: 10px;
            color: var(--white);
            font-size: 1rem;
            outline: none;
            width: 300px;
        }
        .search-box:focus { border-color: var(--primary); }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .game-card {
            background: var(--dark-gray);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            text-decoration: none;
            color: inherit;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .game-thumb {
            height: 120px;
            background: linear-gradient(135deg, var(--gray), var(--black));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .game-info {
            padding: 12px;
        }
        .game-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }
        .game-meta {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            display: flex;
            justify-content: space-between;
        }
        
        /* URL Display */
        .url-bar {
            position: fixed;
            bottom: 20px;
            left: 100px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--primary);
            border-radius: 8px;
            padding: 10px 20px;
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--accent);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <!-- Start Screen -->
    <div id="startScreen">
        <h1 class="logo-text">AMONGUS<br>GXMES</h1>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p class="hold-text">HOLD TO ENTER</p>
    </div>

    <!-- Main App -->
    <div id="app">
        <nav id="sidebar">
            <div class="sidebar-logo">AG</div>
            <div class="nav-item active" onclick="showSection('proxy')">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                <span>PROXY</span>
            </div>
            <div class="nav-item" onclick="showSection('games')">
                <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                <span>GAMES</span>
            </div>
            <div class="nav-item" onclick="showSection('settings')">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                <span>SETTINGS</span>
            </div>
        </nav>

        <main id="mainContent">
            <!-- Proxy Section -->
            <section class="section active" id="proxySection">
                <div class="section-header">
                    <h2 class="section-title">PROXY BROWSER</h2>
                </div>
                <div class="proxy-container">
                    <div class="proxy-toolbar">
                        <div class="proxy-input-group">
                            <input type="text" class="proxy-input" id="proxyUrl" placeholder="Enter URL..." onkeypress="if(event.key==='Enter')navigateProxy()">
                            <button class="proxy-btn" onclick="navigateProxy()">GO</button>
                        </div>
                    </div>
                    <div class="proxy-viewport">
                        <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
                    </div>
                </div>
            </section>

            <!-- Games Section -->
            <section class="section" id="gamesSection">
                <div class="games-header">
                    <h2 class="section-title">GAMES</h2>
                    <input type="text" class="search-box" id="gameSearch" placeholder="Search games..." oninput="searchGames()">
                </div>
                <div class="games-grid" id="gamesGrid"></div>
            </section>

            <!-- Settings Section -->
            <section class="section" id="settingsSection">
                <div class="section-header">
                    <h2 class="section-title">SETTINGS</h2>
                </div>
                <div style="background: var(--dark-gray); padding: 30px; border-radius: 16px; max-width: 600px;">
                    <h3 style="color: var(--primary); margin-bottom: 20px;">Cloudflare Features</h3>
                    <p style="color: rgba(255,255,255,0.7); line-height: 1.8;">
                        ✅ Scramjet Proxy Engine<br>
                        ✅ Wisp WebSocket Server<br>
                        ✅ KV Game Saves<br>
                        ✅ Durable Objects<br>
                        ✅ Edge Caching<br>
                        ✅ URL Routing (/g/ & /id:)
                    </p>
                </div>
            </section>
        </main>
    </div>

    <!-- URL Bar -->
    <div class="url-bar" id="urlBar">edurocks.org/</div>

    <script>
        // Start Screen
        const startScreen = document.getElementById('startScreen');
        let holdTimer;
        
        startScreen.addEventListener('mousedown', () => {
            startScreen.classList.add('holding');
            holdTimer = setTimeout(() => {
                startScreen.classList.add('hidden');
            }, 800);
        });
        
        ['mouseup', 'mouseleave', 'touchend'].forEach(e => {
            startScreen.addEventListener(e, () => {
                clearTimeout(holdTimer);
                startScreen.classList.remove('holding');
            });
        });

        // Navigation
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(section + 'Section').classList.add('active');
            event.target.classList.add('active');
            updateUrl('/' + section);
        }

        // URL Management
        function updateUrl(path) {
            history.pushState({}, '', path);
            document.getElementById('urlBar').textContent = 'edurocks.org' + path;
        }

        // Handle browser back/forward
        window.addEventListener('popstate', (e) => {
            const path = location.pathname;
            if (path.startsWith('/g/')) {
                // Game route handled by server
            } else if (path.startsWith('/id:')) {
                // ID route handled by server
            } else if (path === '/proxy' || path === '/games' || path === '/settings') {
                showSection(path.slice(1));
            }
        });

        // Proxy
        function navigateProxy() {
            const url = document.getElementById('proxyUrl').value;
            if (!url) return;
            const fullUrl = url.startsWith('http') ? url : 'https://' + url;
            document.getElementById('proxyFrame').src = '/p/' + encodeURIComponent(fullUrl);
            updateUrl('/p/' + encodeURIComponent(fullUrl));
        }

        // Games
        let gamesData = {};

        async function loadGames() {
            const res = await fetch('/api/games');
            gamesData = await res.json();
            renderGames();
        }

        function renderGames(filter = '') {
            const grid = document.getElementById('gamesGrid');
            let games = Object.values(gamesData);
            
            if (filter) {
                games = games.filter(g => g.title.toLowerCase().includes(filter.toLowerCase()));
            }
            
            grid.innerHTML = games.map((game, index) => `
                <a href="/g/${game.id}" class="game-card" onclick="updateUrl('/g/${game.id}')">
                    <div class="game-thumb">${game.icon}</div>
                    <div class="game-info">
                        <div class="game-title">${game.title}</div>
                        <div class="game-meta">
                            <span>${game.category}</span>
                            <span>ID:${index}</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        function searchGames() {
            renderGames(document.getElementById('gameSearch').value);
        }

        // Initialize
        loadGames();

        // Handle initial route
        const initialPath = location.pathname;
        if (initialPath.startsWith('/g/') || initialPath.startsWith('/id:')) {
            // Let server handle
        } else if (initialPath === '/games') {
            showSection('games');
        } else if (initialPath === '/settings') {
            showSection('settings');
        }
    </script>
</body>
</html>
