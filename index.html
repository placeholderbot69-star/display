<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Load Proxied Content</title>
  <style>
    html,body{height:100%;margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:#fff;color:#111}
    #container{min-height:100vh;padding:16px;box-sizing:border-box}
    .notice{padding:12px;border-radius:8px;background:#f3f4f6;color:#111}
  </style>
</head>
<body>
  <div id="container">
    <div id="status" class="notice">Loading proxied content…</div>
    <div id="content" style="margin-top:12px"></div>
  </div>

  <script>
    (async () => {
      const WORKER_URL = 'https://display.placeholderbot-69.workers.dev/';
      const status = document.getElementById('status');
      const content = document.getElementById('content');

      try {
        const res = await fetch(WORKER_URL, { method: 'GET', credentials: 'include' });
        if (!res.ok) throw new Error('Fetch failed: ' + res.status);
        const ct = res.headers.get('content-type') || '';
        if (!ct.includes('text/html')) {
          status.textContent = 'Worker returned non-HTML content. Opening in new tab instead.';
          window.open(WORKER_URL, '_blank', 'noopener');
          return;
        }
        const html = await res.text();

        // Basic sanitization: remove <script> tags to avoid executing remote scripts
        const sanitized = html.replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '');

        // Insert HTML into container
        content.innerHTML = sanitized;
        status.style.display = 'none';
      } catch (err) {
        status.textContent = 'Unable to load proxied content. Opening worker in a new tab.';
        window.open(WORKER_URL, '_blank', 'noopener');
      }
    })();
  </script>
</body>
</html>
