<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Embedded Proxied Site</title>
  <style>
    html,body { height:100%; margin:0; background:#111; color:#eee; font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    .frame-wrap { height:100%; display:flex; flex-direction:column; }
    header { padding:10px 14px; background:#0b0b0b; display:flex; align-items:center; gap:12px; }
    header .title { font-weight:600; font-size:15px; }
    header .status { font-size:13px; color:#9aa; }
    main { flex:1; position:relative; }
    iframe { width:100%; height:100%; border:0; display:block; background:white; }
    .fallback { position:absolute; inset:12px; display:flex; gap:8px; align-items:center; justify-content:center; pointer-events:none; }
    .notice { background:rgba(0,0,0,0.6); color:#fff; padding:8px 12px; border-radius:8px; pointer-events:auto; }
    a.button { color:#fff; background:#2563eb; padding:8px 10px; border-radius:6px; text-decoration:none; display:inline-block; }
  </style>
</head>
<body>
  <div class="frame-wrap">
    <header>
      <div class="title">Proxied Embed</div>
      <div class="status" id="status">Loading…</div>
    </header>

    <main>
      <!-- Primary iframe: your Cloudflare Worker route -->
      <iframe id="proxyFrame"
              title="Proxied Site"
              sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-modals allow-popups-to-escape-sandbox"
              src="about:blank"
              loading="eager"></iframe>

      <!-- Fallback UI (visible only if both endpoints fail) -->
      <div class="fallback" id="fallback" style="display:none">
        <div class="notice">
          <div style="margin-bottom:8px">Unable to load the proxied site from the worker or upstream proxy.</div>
          <a id="openDirect" class="button" target="_blank" rel="noopener">Open proxied site in new tab</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      // Configuration
      const WORKER_URL = 'https://display.placeholderbot-69.workers.dev/';
      const UPSTREAM_PROXY_FALLBACK = 'http://159.203.181.211:9191/https://dabinplay-hub-v-wip.base44.app/';
      const DIRECT_TARGET = 'https://dabinplay-hub-v-wip.base44.app/';

      const statusEl = document.getElementById('status');
      const iframe = document.getElementById('proxyFrame');
      const fallbackEl = document.getElementById('fallback');
      const openDirect = document.getElementById('openDirect');

      openDirect.href = WORKER_URL; // default link points to worker

      // Try to fetch a small resource from a URL to check availability.
      // Uses a short timeout. If CORS blocks the check, we still treat a resolved fetch as success.
      function probe(url, timeout = 4000) {
        return new Promise((resolve) => {
          let done = false;
          const timer = setTimeout(() => {
            if (!done) { done = true; resolve(false); }
          }, timeout);

          // First try a normal CORS fetch
          fetch(url, { method: 'GET', cache: 'no-store', mode: 'cors' })
            .then(r => {
              if (!done) { done = true; clearTimeout(timer); resolve(r.ok || r.type === 'opaque'); }
            })
            .catch(() => {
              // If CORS fails, try a no-cors fetch which yields an opaque response but resolves if reachable
              fetch(url, { method: 'GET', cache: 'no-store', mode: 'no-cors' })
                .then(() => { if (!done) { done = true; clearTimeout(timer); resolve(true); } })
                .catch(() => { if (!done) { done = true; clearTimeout(timer); resolve(false); } });
            });
        });
      }

      async function loadProxiedEmbed() {
        statusEl.textContent = 'Checking worker availability…';
        // Probe the worker first
        const workerOk = await probe(WORKER_URL);
        if (workerOk) {
          statusEl.textContent = 'Loading via worker';
          iframe.src = WORKER_URL;
          openDirect.href = WORKER_URL;
          return;
        }

        statusEl.textContent = 'Worker unavailable, trying upstream proxy…';
        // Probe upstream proxy fallback
        const proxyOk = await probe(UPSTREAM_PROXY_FALLBACK);
        if (proxyOk) {
          statusEl.textContent = 'Loading via upstream proxy';
          iframe.src = UPSTREAM_PROXY_FALLBACK;
          openDirect.href = UPSTREAM_PROXY_FALLBACK;
          return;
        }

        // Last resort: try direct target (may be blocked by X-Frame-Options)
        statusEl.textContent = 'Trying direct target (may be blocked from framing)…';
        const directOk = await probe(DIRECT_TARGET);
        if (directOk) {
          statusEl.textContent = 'Loading direct target';
          iframe.src = DIRECT_TARGET;
          openDirect.href = DIRECT_TARGET;
          return;
        }

        // All attempts failed
        statusEl.textContent = 'Failed to load proxied site';
        fallbackEl.style.display = 'flex';
        openDirect.href = WORKER_URL; // keep link to worker as first attempt
      }

      // Start the process
      loadProxiedEmbed();

      // Optional: if the iframe navigates to an error page, show fallback after a delay
      // Note: cross-origin iframes cannot be inspected for content; we rely on load/error events only.
      let loadTimer = null;
      iframe.addEventListener('load', () => {
        statusEl.textContent = 'Loaded';
        if (loadTimer) { clearTimeout(loadTimer); loadTimer = null; }
      });
      iframe.addEventListener('error', () => {
        statusEl.textContent = 'Frame error';
        fallbackEl.style.display = 'flex';
      });

      // Safety: if the iframe doesn't finish loading within 20s, show fallback UI
      loadTimer = setTimeout(() => {
        if (iframe.src && iframe.src !== 'about:blank') {
          statusEl.textContent = 'Load timeout — showing fallback';
          fallbackEl.style.display = 'flex';
        }
      }, 20000);
    })();
  </script>
</body>
</html>
