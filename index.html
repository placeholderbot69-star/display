<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Open Proxied Site</title>
  <style>
    html,body{height:100%;margin:0;display:flex;align-items:center;justify-content:center;font-family:system-ui,Segoe UI,Roboto,Arial;background:#0b0b0b;color:#fff}
    .card{max-width:720px;padding:24px;border-radius:12px;background:#0f1724;text-align:center}
    a.btn{display:inline-block;margin-top:12px;padding:10px 14px;background:#2563eb;color:#fff;border-radius:8px;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h1>Open Proxied Site</h1>
    <p>You will be redirected to the proxied site served by the worker.</p>
    <p><a id="openBtn" class="btn" target="_blank" rel="noopener">Open Proxied Site</a></p>
    <p style="font-size:13px;color:#9aa">If nothing happens, click the button above.</p>
  </div>

  <script>
    const WORKER_URL = 'https://display.placeholderbot-69.workers.dev/';
    const openBtn = document.getElementById('openBtn');
    openBtn.href = WORKER_URL;

    // Optional: auto-redirect after 1.2s
    setTimeout(() => { window.location.href = WORKER_URL; }, 1200);
  </script>
</body>
</html>
