name = "amongusgxmes"
main = "worker.js"
compatibility_date = "2024-01-01"

[site]
bucket = "./public"

[[kv_namespaces]]
binding = "GAME_SAVES"
id = "your-kv-namespace-id"

[[kv_namespaces]]
binding = "GAME_STATS"
id = "your-kv-namespace-id-2"

[[durable_objects.bindings]]
name = "WISP_CONNECTIONS"
class_name = "WispServer"

[[migrations]]
tag = "v1"
new_classes = ["WispServer"]
